name: Fetch ECCC Records

on:
  schedule:
    # Run daily at 06:00 UTC (2 AM EDT / 1 AM EST)
    - cron: "0 6 * * *"
  workflow_dispatch:   # allow manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/fetch_records.py"   # re-run whenever the script changes

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data files back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run fetch script
        run: python scripts/fetch_records.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json data/stations.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update weather records $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
